<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live poll — Wikimania 2026</title>
<!--
  Audience side of the live poll. No server, no database, no accounts.
  The presentation (index.html) is the presenter: it counts the votes and
  tells this page which question to show. Votes travel through a free
  public MQTT broker over secure WebSockets — config shared with the
  presentation lives in polls.js.

  How it works:
  - This URL never changes, so it can be clicked straight from the slides.
  - The speaker moves to a poll slide → a retained "control" message
    tells every audience page which question to show. Only the speaker's
    deck (opened with the presenter key) can publish it.
  - Tap an option → retained message on <prefix>/vote/<question>/<clientId>.
    One device = one vote (latest tap wins).
-->
<script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
<script src="polls.js"></script>
<style>
  @font-face {
    font-family: "Mona Sans";
    src: url("fonts/Mona-Sans.woff2") format("woff2");
    font-weight: 200 900;
    font-display: swap;
  }
  :root {
    --primary: #004eeb;
    --accent: #0040c1;
    --cta: #ffb020;
    --text: #171717;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Mona Sans", system-ui, sans-serif;
    color: var(--text);
    background: #fff;
    min-height: 100vh;
  }
  main { max-width: 40rem; margin: 0 auto; padding: 1.5rem; }
  .kicker {
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
    font-size: 0.85rem;
  }
  h1 { color: var(--primary); font-weight: 800; line-height: 1.15; margin: 0.3em 0 0.8em; }

  .option {
    display: block;
    width: 100%;
    margin: 0.6rem 0;
    padding: 1.1rem 1.2rem;
    font: inherit;
    font-size: 1.25rem;
    font-weight: 600;
    text-align: left;
    color: var(--primary);
    background: #fff;
    border: 3px solid var(--primary);
    border-radius: 0.6rem;
    cursor: pointer;
  }
  .option:active { transform: scale(0.99); }
  .option.mine { background: var(--cta); border-color: var(--cta); color: var(--text); }
  .status { opacity: 0.55; font-size: 0.9rem; }
  .dot { display: inline-block; width: 0.6em; height: 0.6em; border-radius: 50%;
         background: #999; margin-right: 0.4em; }
  .dot.on { background: #1a9e4b; }
</style>
</head>
<body>

<main>
  <p class="kicker">Live poll</p>
  <h1 id="q">Waiting for the presenter to start the poll…</h1>
  <div id="options"></div>
  <p class="status"><span class="dot" id="dot"></span><span id="status">connecting…</span></p>
</main>

<script>
"use strict";

const clientId =
  localStorage.getItem("poll-client-id") ||
  (() => {
    const id = Math.random().toString(36).slice(2, 10);
    localStorage.setItem("poll-client-id", id);
    return id;
  })();

let myVotes = JSON.parse(localStorage.getItem("poll-votes") || "{}");
let activeQid = null;

const client = mqtt.connect(BROKER_URL, { reconnectPeriod: 2000, keepalive: 30 });

client.on("connect", () => {
  setStatus(true);
  client.subscribe(TOPIC_PREFIX + "/control");
});
client.on("reconnect", () => setStatus(false));
client.on("offline", () => setStatus(false));
client.on("error", () => setStatus(false));

client.on("message", (topic, payload) => {
  const msg = payload.toString();
  if (topic === TOPIC_PREFIX + "/control" && msg) setActive(msg);
});

function setStatus(online) {
  document.getElementById("dot").classList.toggle("on", online);
  document.getElementById("status").textContent = online ? "connected" : "reconnecting…";
}

function setActive(qid) {
  if (!pollById(qid) || qid === activeQid) return;
  activeQid = qid;
  render();
}

function render() {
  const poll = pollById(activeQid);
  if (!poll) return;
  document.getElementById("q").textContent = poll.q;
  const box = document.getElementById("options");
  box.innerHTML = "";
  for (const [key, label] of poll.options) {
    const btn = document.createElement("button");
    btn.className = "option" + (myVotes[poll.id] === key ? " mine" : "");
    btn.textContent = label;
    btn.onclick = () => castVote(poll.id, key);
    box.appendChild(btn);
  }
}

function castVote(qid, key) {
  if (!client.connected) return;
  client.publish(`${TOPIC_PREFIX}/vote/${qid}/${clientId}`, key, { retain: true });
  myVotes[qid] = key;
  localStorage.setItem("poll-votes", JSON.stringify(myVotes));
  render();
}
</script>
</body>
</html>
